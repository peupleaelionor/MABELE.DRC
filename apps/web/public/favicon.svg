<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- MABELE app icon — circular globe mark -->
  <defs>
    <clipPath id="favicon-clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- Outer rounded square background -->
  <rect width="64" height="64" rx="14" fill="#0C1E47"/>

  <!-- Circular globe mark -->
  <circle cx="32" cy="32" r="26" fill="#0C1E47"/>

  <g clip-path="url(#favicon-clip)">
    <!-- Royal blue top -->
    <path d="M2,2 L62,2 L62,26 Q47,20 32,23 Q17,26 2,20 Z" fill="#1B4FB3"/>
    <!-- Red mid -->
    <path d="M2,20 Q17,26 32,23 Q47,20 62,26 L62,40 Q47,34 32,37 Q17,40 2,34 Z" fill="#CE1126"/>
    <!-- Gold lower -->
    <path d="M2,34 Q17,40 32,37 Q47,34 62,40 L62,54 Q47,48 32,51 Q17,54 2,48 Z" fill="#F5A623"/>
    <!-- Navy bottom -->
    <path d="M2,48 Q17,54 32,51 Q47,48 62,54 L62,62 L2,62 Z" fill="#0C1E47"/>
  </g>

  <!-- Circle stroke -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
</svg>
