<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background: near-black, rounded square -->
  <rect width="64" height="64" rx="14" fill="#0E0E0E"/>

  <!-- MABELE spiral/vortex mark — brand orange #C85C20 -->
  <!-- Three-arm triskelion: each arm is a curved blade radiating from center -->

  <!-- Arm 1: upper-right -->
  <path d="M32,32 C36,26 44,20 50,22 C56,24 56,34 52,38 C48,42 40,42 36,38 C33,36 32,33 32,32 Z"
        fill="#C85C20"/>

  <!-- Arm 2: lower-right (rotated 120°) -->
  <path d="M32,32 C36,26 44,20 50,22 C56,24 56,34 52,38 C48,42 40,42 36,38 C33,36 32,33 32,32 Z"
        fill="#C85C20" opacity="0.78" transform="rotate(120,32,32)"/>

  <!-- Arm 3: left (rotated 240°) -->
  <path d="M32,32 C36,26 44,20 50,22 C56,24 56,34 52,38 C48,42 40,42 36,38 C33,36 32,33 32,32 Z"
        fill="#C85C20" opacity="0.52" transform="rotate(240,32,32)"/>

  <!-- Center: warm cream dot anchoring the spiral -->
  <circle cx="32" cy="32" r="4.5" fill="#EDE8DE"/>
</svg>
