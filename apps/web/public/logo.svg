<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">
  <!--
    MABELE — Full wordmark logo (light variant)
    Mark: circular globe with DRC-inspired colored bands
    Wordmark: MABELE in Royal Blue bold sans-serif
  -->

  <!-- ── Circular mark ── 64×64, centered at (32,36) -->
  <defs>
    <clipPath id="mark-clip">
      <circle cx="32" cy="36" r="30"/>
    </clipPath>
  </defs>

  <!-- Base circle: midnight blue -->
  <circle cx="32" cy="36" r="30" fill="#0C1E47"/>

  <!-- Clipped band layers — flowing horizontal waves -->
  <g clip-path="url(#mark-clip)">
    <!-- Royal blue upper third -->
    <path d="M2,6 L62,6 L62,30 Q47,24 32,27 Q17,30 2,24 Z" fill="#1B4FB3"/>
    <!-- Red mid band -->
    <path d="M2,24 Q17,30 32,27 Q47,24 62,30 L62,46 Q47,40 32,43 Q17,46 2,40 Z" fill="#CE1126"/>
    <!-- Gold/yellow lower band -->
    <path d="M2,40 Q17,46 32,43 Q47,40 62,46 L62,58 Q47,52 32,55 Q17,58 2,52 Z" fill="#F5A623"/>
    <!-- Midnight blue bottom cap -->
    <path d="M2,52 Q17,58 32,55 Q47,52 62,58 L62,66 L2,66 Z" fill="#0C1E47"/>
  </g>

  <!-- Circle border for definition -->
  <circle cx="32" cy="36" r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ── MABELE wordmark — Royal Blue, DM Sans bold ── -->
  <text
    x="76" y="48"
    font-family="'DM Sans', system-ui, sans-serif"
    font-weight="700"
    font-size="34"
    fill="#1B4FB3"
    letter-spacing="1"
  >MABELE</text>
</svg>
