<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <!--
    MABELE — Full wordmark logo (dark variant)
    Usage: dark backgrounds (#0E0E0E). For light backgrounds swap fill colors.
    Mark: spiral/vortex in #C85C20 (brand orange)
    Wordmark: "MABELE" in bold serif, #EDE8DE (warm cream)
  -->

  <!-- ── Spiral vortex mark ── centered at (36, 36) in a ~72×72 zone -->

  <!-- Arm 1: upper-right -->
  <path d="M36,36 C41,29 51,22 58,24 C65,26 65,38 60,43 C55,48 44,48 40,43 C37,40 36,37 36,36 Z"
        fill="#C85C20"/>

  <!-- Arm 2: lower-right (rotated 120°) -->
  <path d="M36,36 C41,29 51,22 58,24 C65,26 65,38 60,43 C55,48 44,48 40,43 C37,40 36,37 36,36 Z"
        fill="#C85C20" opacity="0.78" transform="rotate(120,36,36)"/>

  <!-- Arm 3: left (rotated 240°) -->
  <path d="M36,36 C41,29 51,22 58,24 C65,26 65,38 60,43 C55,48 44,48 40,43 C37,40 36,37 36,36 Z"
        fill="#C85C20" opacity="0.52" transform="rotate(240,36,36)"/>

  <!-- Center anchor dot — warm cream -->
  <circle cx="36" cy="36" r="5" fill="#EDE8DE"/>

  <!-- ── MABELE wordmark ── Playfair Display Black, warm cream -->
  <text
    x="82" y="50"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-size="38"
    fill="#EDE8DE"
    letter-spacing="3"
  >MABELE</text>
</svg>
