[build]
builder = "NIXPACKS"
buildCommand = "cd ../.. && pnpm install && pnpm build --filter=@mabele/web"

[deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "mabele-web"
source = "."

  [services.variables]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  PORT = "3000"

[[services]]
name = "mabele-postgres"
source = "postgresql"

  [services.variables]
  POSTGRES_DB = "mabele_db"
