version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mabele_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mabele
      POSTGRES_PASSWORD: mabele_password
      POSTGRES_DB: mabele_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mabele -d mabele_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis — Sessions & Cache
  redis:
    image: redis:7-alpine
    container_name: mabele_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_password
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch — Full-text Search
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: mabele_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: mabele_search_master_key
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local

networks:
  default:
    name: mabele_network
